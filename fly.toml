# fly.toml app configuration
app = "tts-converter"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
PYTHONUNBUFFERED = "1"
ENVIRONMENT = "production"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[services]]
protocol = "tcp"
internal_port = 8000

  [services.concurrency]
  type = "connections"
  hard_limit = 1000
  soft_limit = 100

  [[services.ports]]
  port = 80
  handlers = ["http"]
  force_https = true

  [[services.ports]]
  port = 443
  handlers = ["tls", "http"]

[checks]
  [checks.alive]
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/health"
