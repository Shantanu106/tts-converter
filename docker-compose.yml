version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tts-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - TTS_MODEL=speecht5_tts
      - USE_GPU=false
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
      - ./audio_cache:/app/audio_cache
    networks:
      - tts-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service (optional - for development)
  frontend-dev:
    image: node:20-alpine
    container_name: tts-frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    networks:
      - tts-network
    environment:
      - VITE_API_URL=http://localhost:8000
    profiles:
      - dev

  # Nginx reverse proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: tts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - tts-network
    depends_on:
      - backend
    profiles:
      - prod

networks:
  tts-network:
    driver: bridge
